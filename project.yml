name: MailKeep
options:
  bundleIdPrefix: com.mailkeep
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
  groupSortPosition: top

settings:
  base:
    PRODUCT_NAME: MailKeep
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: ""

targets:
  MailKeep:
    type: application
    platform: macOS
    bundleId: com.mailkeep.MailKeep
    sources:
      - path: MailKeep
        excludes:
          - "**/*.md"
    entitlements:
      path: MailKeep/MailKeep.entitlements
    info:
      path: MailKeep/Info.plist
      properties:
        CFBundleDisplayName: MailKeep
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        LSMinimumSystemVersion: "14.0"
        NSHumanReadableDescription: "Backup d'emails IMAP vers format mbox"
        NSPrincipalClass: NSApplication
    settings:
      base:
        INFOPLIST_FILE: MailKeep/Info.plist
        CODE_SIGN_ENTITLEMENTS: MailKeep/MailKeep.entitlements
